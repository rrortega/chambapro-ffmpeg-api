name: Build and push Docker image

# Configura el trigger: se ejecutará al hacer push a la rama 'main'
on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      # 1. Clona el código de tu repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Inicia sesión en Docker Hub usando los secretos configurados
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME || secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Configura Docker Buildx (para funciones avanzadas como multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Construye la imagen y la sube a Docker Hub (con caché de GitHub Actions habilitado)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Etiqueta la imagen con tu usuario y el nombre del repositorio
          # Usa 'latest' para la rama principal
          tags: ${{ vars.DOCKER_USERNAME || secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Actualiza la descripción/README en Docker Hub automáticamente
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKER_USERNAME || secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKER_USERNAME || secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}
          readme-filepath: ./DOCKERHUB.md
